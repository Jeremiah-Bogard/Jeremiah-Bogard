<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#111312"/>

  <!-- Broadcast arcs (left of monitor) -->
  <g opacity="0.35" stroke="#34d399" fill="none" stroke-linecap="round">
    <path d="M 10 32 A 7 7 0 0 1 24 32" stroke-width="2"/>
    <path d="M 7 32 A 10 10 0 0 1 27 32" stroke-width="1.5"/>
    <path d="M 4 32 A 13 13 0 0 1 30 32" stroke-width="1"/>
  </g>

  <!-- Broadcast dot -->
  <circle cx="17" cy="32" r="2.5" fill="#34d399"/>
  <circle cx="17" cy="32" r="4.5" fill="none" stroke="#34d399" stroke-width="1" opacity="0.35"/>

  <!-- Monitor frame -->
  <rect x="28" y="14" width="28" height="22" rx="2.5" fill="none" stroke="#34d399" stroke-width="1.8"/>
  <!-- Screen inner fill -->
  <rect x="30.5" y="16.5" width="23" height="17" rx="1.5" fill="#34d399" opacity="0.08"/>
  <!-- Scanlines -->
  <line x1="30.5" y1="20" x2="53.5" y2="20" stroke="#34d399" stroke-width="0.5" opacity="0.3"/>
  <line x1="30.5" y1="24" x2="53.5" y2="24" stroke="#34d399" stroke-width="0.5" opacity="0.3"/>
  <line x1="30.5" y1="28" x2="53.5" y2="28" stroke="#34d399" stroke-width="0.5" opacity="0.3"/>
  <!-- Play triangle -->
  <polygon points="37,18 37,32 50,25" fill="#34d399" opacity="0.8"/>
  <!-- Monitor stand -->
  <line x1="42" y1="36" x2="42" y2="43" stroke="#34d399" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="35" y1="43" x2="49" y2="43" stroke="#34d399" stroke-width="1.8" stroke-linecap="round"/>

  <!-- "JB" initials below -->
  <text
    x="8" y="59"
    font-family="'DM Sans', 'Helvetica Neue', sans-serif"
    font-size="10"
    font-weight="700"
    letter-spacing="0.5"
    fill="#f0faf6">JB</text>

  <!-- Dot separator -->
  <circle cx="27" cy="56" r="1.5" fill="#34d399" opacity="0.7"/>

  <!-- "TV" label -->
  <text
    x="31" y="59"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="8"
    font-weight="400"
    letter-spacing="1"
    fill="#34d399">TV</text>

</svg>
