<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&amp;family=DM+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" rx="12" fill="#111312"/>

  <!-- Signal/broadcast arc decorations (top-left) -->
  <g opacity="0.18" stroke="#34d399" fill="none" stroke-linecap="round">
    <path d="M 52 80 A 20 20 0 0 1 88 80" stroke-width="2.5"/>
    <path d="M 42 80 A 30 30 0 0 1 98 80" stroke-width="2"/>
    <path d="M 32 80 A 40 40 0 0 1 108 80" stroke-width="1.5"/>
  </g>

  <!-- Broadcast dot (center of signal arcs) -->
  <circle cx="70" cy="80" r="5" fill="#34d399"/>
  <circle cx="70" cy="80" r="8.5" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.35"/>

  <!-- Monitor / screen icon -->
  <rect x="106" y="52" width="52" height="38" rx="4" fill="none" stroke="#34d399" stroke-width="2"/>
  <!-- Screen inner glow area -->
  <rect x="110" y="56" width="44" height="30" rx="2" fill="#34d399" opacity="0.08"/>
  <!-- Screen scanlines -->
  <line x1="110" y1="63" x2="154" y2="63" stroke="#34d399" stroke-width="0.6" opacity="0.25"/>
  <line x1="110" y1="70" x2="154" y2="70" stroke="#34d399" stroke-width="0.6" opacity="0.25"/>
  <line x1="110" y1="77" x2="154" y2="77" stroke="#34d399" stroke-width="0.6" opacity="0.25"/>
  <!-- Play triangle on screen -->
  <polygon points="126,64 126,82 144,73" fill="#34d399" opacity="0.75"/>
  <!-- Monitor stand -->
  <line x1="132" y1="90" x2="132" y2="100" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="100" x2="144" y2="100" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>

  <!-- JB wordmark -->
  <text
    x="178" y="92"
    font-family="'DM Sans', 'Helvetica Neue', sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1"
    fill="#f0faf6">JB</text>

  <!-- Separator dot -->
  <circle cx="280" cy="83" r="4" fill="#34d399" opacity="0.6"/>

  <!-- TECH in emerald -->
  <text
    x="293" y="92"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="36"
    font-weight="500"
    letter-spacing="2"
    fill="#34d399">TECH</text>

  <!-- TV in lighter tone -->
  <text
    x="395" y="92"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="36"
    font-weight="400"
    letter-spacing="1"
    fill="#6ee7b7"
    opacity="0.75">TV</text>

  <!-- Bottom tagline -->
  <text
    x="178" y="116"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="11"
    font-weight="400"
    letter-spacing="3.5"
    fill="#34d399"
    opacity="0.5">jbtechtv.com</text>

  <!-- Subtle bottom rule -->
  <line x1="178" y1="123" x2="447" y2="123" stroke="#34d399" stroke-width="0.5" opacity="0.18"/>
</svg>
